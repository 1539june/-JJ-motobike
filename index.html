<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ร้านไพรบูลย์โมโตไบค์</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a73e8">
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff;
            /* ป้องกันการเลื่อนหน้าจอสีขาวเกินขอบบน iOS และ Android */
            position: fixed; 
        }
        iframe {
            border: none;
            display: block;
            width: 100vw;
            height: 100vh;
            max-width: 100%;
            max-height: 100%;
            margin: 0;
            padding: 0;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbxvBwyePrV_0RTj1obkoqiSHFlRUhrjwxXvjjP-yvc8ArVm0xGphS0QXIz4Qv4LeHIp/exec"></iframe>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('PWA Ready!'))
                    .catch(err => console.log('PWA Error:', err));
            });
        }
    </script>
</body>
</html>
